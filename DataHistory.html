    .section-title {

    .form-group {

    .form-label {

    .form-control:focus {

    }

    .btn-group {
      display: flex;

    .btn-primary {

    }

    .btn-primary:hover {

    .btn-secondary {

      color: white;

    }

    .btn-secondary:hover {

    .table-responsive {

    table {

    tbody tr:hover {

    }

    .empty-state {
      text-align: center;
      padding: 60px 20px;

    }

    .empty-icon {
      font-size: 64px;

    }

    .loading {
      text-align: center;

    }

    .spinner {

      border-top: 3px solid #667eea;

    }

    @keyframes spin {
      0% { transform: rotate(0deg); }
      100% { transform: rotate(360deg); }
    }

    .btn-link {
      padding: 6px 12px;

      font-size: 12px;
      cursor: pointer;
      text-decoration: none;

    }

    .btn-link:hover {

    }

    .search-container {
      display: flex;
      gap: 15px;
      align-items: flex-end;

    }

    @media (max-width: 1024px) {
      .search-container {
        flex-wrap: wrap;
      }

      }

  </style>
</head>
<body>
  <div class="header">
    <div class="header-content">
      <div class="header-title">
        <div class="company-name">Johnson Electric Operations</div>
        <h1>협력사 수입검사 관리</h1>
        <p id="userInfo">로딩 중...</p>
      </div>
      <div class="header-actions">
        <button class="btn btn-outline" onclick="logout()">로그아웃</button>
      </div>
    </div>
  </div>

  <div class="container">
    <?!= include('Navigation') ?>

    <div class="section">
      <div class="section-header">
        <h2 class="section-title">성적서 이력 관리</h2>
      </div>

      <!-- 검색 폼 -->
      <div class="search-container">
        <div class="form-group">
          <label class="form-label">업체명</label>
          <select class="form-control" id="searchCompany">
            <option value="">전체</option>
          </select>
        </div>
        <div class="form-group">
          <label class="form-label">시작 날짜</label>
          <input type="date" class="form-control" id="searchDateFrom">
        </div>
        <div class="form-group">
          <label class="form-label">종료 날짜</label>
          <input type="date" class="form-control" id="searchDateTo">
        </div>
        <div class="form-group">
          <label class="form-label">TM-NO</label>
          <input type="text" class="form-control" id="searchTmNo" placeholder="TM-NO 검색">
        </div>
        <div class="btn-group">
          <button class="btn-primary" onclick="searchData()">🔍 검색</button>
          <button class="btn-secondary" onclick="clearSearch()">↻ 초기화</button>
        </div>
      </div>

      <!-- 결과 테이블 -->
      <div id="tableContainer">
        <div class="empty-state">
          <div class="empty-icon">🔍</div>
          <p>검색 조건을 설정하고 검색 버튼을 눌러주세요.</p>
          <p style="font-size: 14px; color: #999; margin-top: 10px;">업체명, 날짜기간, TM-NO로 검색하거나, 조건 없이 검색하면 전체 데이터를 조회합니다.</p>
        </div>
      </div>
    </div>
  </div>

  <script>
    let sessionToken = null;
    let currentUser = null;

    // 토큰 초기화
    function initToken() {
      const serverToken = '<?!= token ?>';

      if (serverToken && serverToken !== 'undefined' && serverToken.length > 10) {
        sessionToken = serverToken;
        sessionStorage.setItem('sessionToken', serverToken);
      } else {
        sessionToken = sessionStorage.getItem('sessionToken');
      }

      if (!sessionToken) {
        redirectToLogin();
      }

      return sessionToken;
    }

    // 페이지 이동
    function safeNavigate(url, params) {
      let fullUrl = url;
      if (params) {
        const queryString = Object.keys(params)
          .map(key => encodeURIComponent(key) + '=' + encodeURIComponent(params[key]))
          .join('&');
        fullUrl = url + '?' + queryString;
      }
      window.top.location.href = fullUrl;
    }

    function redirectToLogin() {
      sessionStorage.removeItem('sessionToken');
      safeNavigate('https://script.google.com/macros/s/AKfycbxpjukKc_G4SaPL52w47ANnQc8MvCmkP6IzUX8DaXBqqdz_L8Th3kLqv4_HdslfGnxIBw/exec', null);
    }

    function goToPage(page) {
      const token = sessionStorage.getItem('sessionToken');
      const webAppUrl = '<?= getWebAppUrl() ?>';
      safeNavigate(webAppUrl, {
        'page': page,
        'token': token,
        't': Date.now()
      });
    }

    // 검사결과등록 모달 (Dashboard로 이동하면서 자동 열기)
    function showInspectionResultModal() {
      const token = sessionStorage.getItem('sessionToken');
      const webAppUrl = '<?= getWebAppUrl() ?>';
      safeNavigate(webAppUrl, {
        'page': 'dashboard',
        'token': token,
        'openInspectionModal': 'true',
        't': Date.now()
      });
    }

    // 페이지 로드
    window.onload = function() {
      initToken();
      loadUserInfo();
      loadCompanyList();
    };

    // 네비게이션 초기화
    function initNavigation(currentPage, userRole) {
      const navButtons = {
        'dashboard': 'navDashboard',
        'entry': 'navEntry',
        'history': 'navHistory',
        'certificate': 'navCertificate'
      };

      if (navButtons[currentPage]) {
        const btn = document.getElementById(navButtons[currentPage]);
        if (btn) {
          btn.classList.add('active');
        }
      }

      // Item 등록 버튼은 대시보드에서만 표시
      const itemBtn = document.getElementById('navItem');
      if (itemBtn) {
        itemBtn.style.display = 'none';
      }

      // 검사결과등록 버튼은 관리자 또는 JEO만 표시
      const inspectionResultBtn = document.getElementById('navInspectionResult');
      if (inspectionResultBtn) {
        inspectionResultBtn.style.display = (userRole === '관리자' || userRole === 'JEO') ? 'inline-block' : 'none';
      }

      // 검사결과이력 버튼은 관리자 또는 JEO만 표시
      const inspectionHistoryBtn = document.getElementById('navInspectionHistory');
      if (inspectionHistoryBtn) {
        inspectionHistoryBtn.style.display = (userRole === '관리자' || userRole === 'JEO') ? 'inline-block' : 'none';
      }

      // JEO는 성적서입력, 이력관리, 확인증출력 버튼 숨김
      const entryBtn = document.getElementById('navEntry');
      if (entryBtn) {
        entryBtn.style.display = (userRole === 'JEO') ? 'none' : 'inline-block';
      }

      const historyBtn = document.getElementById('navHistory');
      if (historyBtn) {
        historyBtn.style.display = (userRole === 'JEO') ? 'none' : 'inline-block';
      }

      const certificateBtn = document.getElementById('navCertificate');
      if (certificateBtn) {
        certificateBtn.style.display = (userRole === 'JEO') ? 'none' : 'inline-block';
      }

      // 사용자 관리 버튼은 관리자만 표시
      const usersBtn = document.getElementById('navUsers');
      if (usersBtn) {
        usersBtn.style.display = (userRole === '관리자') ? 'inline-block' : 'none';
      }

      const navMenu = document.getElementById('navMenu');
      if (navMenu) {
        navMenu.style.opacity = '1';
      }
    }

    function handleItemClick() {
      goToPage('dashboard');
    }

    // 사용자 정보 로드
    function loadUserInfo() {
      google.script.run
        .withSuccessHandler(function(response) {
          if (response.success) {
            const user = response.user;
            currentUser = user;
            document.getElementById('userInfo').textContent =
              user.companyName + ' | ' + user.name + ' (' + user.role + ')';
            initNavigation('history', user.role);
          } else {
            redirectToLogin();
          }
        })
        .withFailureHandler(function(error) {
          console.error('사용자 정보 로드 실패:', error);
          redirectToLogin();
        })
        .getCurrentUserByToken(sessionToken);
    }

    // 업체 목록 로드
    function loadCompanyList() {
      google.script.run
        .withSuccessHandler(function(response) {
          if (response.success && response.companies) {
            const select = document.getElementById('searchCompany');
            response.companies.forEach(function(company) {
              const option = document.createElement('option');
              option.value = company;
              option.textContent = company;
              select.appendChild(option);
            });
          }
        })
        .withFailureHandler(function(error) {
          console.error('업체 목록 로드 실패:', error);
        })
        .getCompanyList(sessionToken);
    }

    // 검색
    function searchData() {
      const companyName = document.getElementById('searchCompany').value.trim();
      const dateFrom = document.getElementById('searchDateFrom').value.trim();
      const dateTo = document.getElementById('searchDateTo').value.trim();
      const tmNo = document.getElementById('searchTmNo').value.trim();

      const options = {};
      if (companyName) options.searchCompany = companyName;
      if (dateFrom) options.dateFrom = dateFrom;
      if (dateTo) options.dateTo = dateTo;
      if (tmNo) options.searchTmNo = tmNo;

      // 로딩 표시
      const container = document.getElementById('tableContainer');
      container.innerHTML = '<div class="loading"><div class="spinner"></div><p>데이터를 불러오는 중...</p></div>';

      google.script.run
        .withSuccessHandler(displayData)
        .withFailureHandler(function(error) {
          console.error('데이터 로드 실패:', error);
          showError('데이터를 불러올 수 없습니다.');
        })
        .getData(sessionToken, options);
    }

    // 검색 초기화
    function clearSearch() {
      document.getElementById('searchCompany').value = '';
      document.getElementById('searchDateFrom').value = '';
      document.getElementById('searchDateTo').value = '';
      document.getElementById('searchTmNo').value = '';

      const container = document.getElementById('tableContainer');
      container.innerHTML = '<div class="empty-state"><div class="empty-icon">🔍</div><p>검색 조건을 설정하고 검색 버튼을 눌러주세요.</p></div>';
    }

    // 데이터 표시
    function displayData(response) {
      const container = document.getElementById('tableContainer');

      if (!response || !response.success) {
        showError(response ? response.message : '데이터를 불러올 수 없습니다.');
        return;
      }

      const data = response.data || [];

      if (data.length === 0) {
        container.innerHTML = '<div class="empty-state"><div class="empty-icon">📭</div><p>검색 결과가 없습니다.</p></div>';
        return;
      }

      let html = '<div class="table-responsive"><table><thead><tr>';
      html += '<th>업체명</th>';
      html += '<th>입고날짜</th>';
      html += '<th>입고시간</th>';
      html += '<th>TM-NO</th>';
      html += '<th>제품명</th>';
      html += '<th>수량</th>';
      html += '<th>성적서</th>';
      html += '</tr></thead><tbody>';

      data.forEach(function(item) {
        html += '<tr>';
        html += '<td>' + (item.companyName || '') + '</td>';
        html += '<td>' + (item.date || '') + '</td>';
        html += '<td>' + (item.time || '') + '</td>';
        html += '<td>' + (item.tmNo || '') + '</td>';
        html += '<td>' + (item.productName || '') + '</td>';
        html += '<td>' + (item.quantity || 0) + '</td>';
        html += '<td>';
        if (item.pdfUrl) {
          html += '<a href="' + item.pdfUrl + '" target="_blank" class="btn-link">📄 보기</a>';
        } else {
          html += '-';
        }
        html += '</td>';
        html += '</tr>';
      });

      html += '</tbody></table></div>';
      html += '<p style="margin-top: 15px; color: #666; font-size: 14px;">총 ' + data.length + '건</p>';

      container.innerHTML = html;
    }

    // 에러 표시
    function showError(message) {
      const container = document.getElementById('tableContainer');
      container.innerHTML = '<div class="empty-state"><div class="empty-icon">⚠️</div><p>' + message + '</p></div>';
    }

    // 로그아웃
    function logout() {
      if (confirm('로그아웃 하시겠습니까?')) {
        const token = sessionStorage.getItem('sessionToken');
        google.script.run
          .withSuccessHandler(function() {
            sessionStorage.removeItem('sessionToken');
            redirectToLogin();
          })
          .withFailureHandler(function(error) {
            console.error('로그아웃 실패:', error);
            sessionStorage.removeItem('sessionToken');
            redirectToLogin();
          })
          .logoutWithToken(token);
      }
    }
  </script>
</body>
</html>
